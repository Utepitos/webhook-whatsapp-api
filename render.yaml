services:
  - type: web
    name: eduruta-ai
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: VERIFY_TOKEN
        sync: false
      - key: FLOWISE_URL
        sync: false
      - key: FLOWISE_FLOW_ID
        sync: false
      - key: FLOWISE_API_KEY
        sync: false
      - key: FLOWISE_TIMEOUT_MS
        value: 15000
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false